<!DOCTYPE html>
<!--
     Always start a HTML document with <!DOCTYPE HTML> to declare that you are using HTML5.
     It is not case-sensitive, so you can use doctype html, DOCTYPE HTML, or DOCTYPE html.
-->

<html>
    <!--
         1. After declaring the DOCTYPE, and before you start your HTML scripting, always start with a HTML tag first.
         2. Open with <html> and close with </html>. Do not mix the tags.
    -->
</html>
