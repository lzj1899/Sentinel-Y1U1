<!DOCTYPE html>
<html>
    <!--
         TASK CRITERIA:
         1. Heading with the text: "These are a few of my favorite things"
         2. A paragraph with the text "This is a list of my top 3 favorite things in the world! I hope you like them too :)"
         3. A numbered list of your top 3 favorite things in the world.

         Things to watch out for:
         1. The elements, the assignment only asked for heading, paragraph, and numbered lists.
         2. Please only use <h1></h1> to <h6></h6> for the heading, <p></p> for the paragraph, and <ol></ol> for the numbered list.
         3. DO NOT manually hard code the number into the list.
    -->

    <!-- Heading -->
    <h1>These are a few of my favorite things</h1>

    <!-- Paragraph -->
    <p>This is a list of my top 3 favorite things in the world! I hope you like them too :)</p>

    <!-- Numbered List -->
    <ol>
        <!-- 
             1. DO NOT manually type out the number for the items.
                You have already use the ordered list element for that, now just add the items using the list item element <li></li>
             2. The following are examples, please use your own favorite items for submissions.
        -->
        <li>Money</li>
        <li>Gold</li>
        <li>F1</li>
    </ol>
</html>
