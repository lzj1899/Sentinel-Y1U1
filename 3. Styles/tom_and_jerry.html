<!DOCTYPE html>
<html>
    <!--
         TASK CRITERIA:
         1. You are given two image elements <img>, one of Tom cat and another of Jerry mouse.
            You need to use CSS styling to resize the images so that the image are proportional.
            a. <img src="https://i.ibb.co/Z2P3fvm/jerry.png" />
            b. <img src="https://i.ibb.co/MVnghyy/tom.png" />
         2. Only inline CSS styling can be used.

         Things to watch out for:
         1. Do not change the element tags or add elements into the given elements.
         2. Only add sytling to the given elements.
         3. In HTML images are measured in pixels (px), not in CM or M.
    -->

    <!--
         If you have run the HTML script without resizing, you would realize both images are of similar size.
         So you need to resize Jerry mouse and Tom cat to make them proportional to each other.
         For Jerry mouse, you need to adjust both its height and width so that it is reduced proportionally.
    -->
    <img src="https://i.ibb.co/Z2P3fvm/jerry.png" style="width: 150px; height: 150px;"/>
    <img src="https://i.ibb.co/MVnghyy/tom.png" style="width: 500px;"/>
</html>
