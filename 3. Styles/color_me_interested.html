<!DOCTYPE html>
<html>
    <!--
         TASK CRITERIA:
         1. You are given three elements, and you need to add CSS styles to the elements to match their descriptions.
            a. <p>This text is red on a black background</p>
            b. <button>This button is green with white text</button>
            c. <h1>This heading is white. Woops, where did it go?</h1>
         2. Only inline CSS styling can be used.

         Things to watch out for:
         1. Do not change the element tags or add elements into the given elements.
         2. Only add sytling to the given elements.
    -->

    <!--
         1. To change the text color, use color: [desired color];.
         2. To change background color, use background-color: [desired-color];.
         3. Add this styling inside the paragraph opening tag.
    -->
    <p style="color: red; background-color: black;">This text is red on a black background</p>

    <!--
         1. Do the same for the button as above.
    -->
    <button style="color: white; background-color: green;">This button is green with white text</button>

    <!--
         1. Just change the text color to white, with color: white;.
    -->
    <h1>This heading is white. Woops, where did it go?</h1>
</html>
